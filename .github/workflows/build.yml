name: Build binary
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo build --bin boringtun-cli --release
      - uses: actions/upload-artifact@v4
        with:
          name: boringtun-cli-linux-amd64
          path: target/release/boringtun-cli
